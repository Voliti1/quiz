<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소프트웨어공학 퀴즈 마스터</title>
    <style>
        :root { 
            --primary: #4a90e2; 
            --bg: #f5f7fa; 
            --text-main: #333;
            --text-sub: #888;
        }

        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; 
        }

        #quiz-container { 
            background: white; 
            width: 100%; 
            max-width: 600px; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            position: relative;
            min-height: 400px;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; border-radius: 20px; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; text-align: center;
        }

        h2 { color: var(--primary); margin-bottom: 10px; }
        input[type="text"] { padding: 12px; width: 80%; margin-bottom: 15px; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; }
        
        .setup-group { margin-bottom: 20px; width: 100%; }
        .setup-group p { font-weight: bold; margin-bottom: 10px; color: var(--text-main); }
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        
        button { 
            padding: 12px 20px; border: 2px solid var(--primary); background: white; 
            color: var(--primary); border-radius: 8px; cursor: pointer; font-weight: 600;
            transition: all 0.2s;
        }
        button.selected { background: var(--primary); color: white; }
        button.start-btn { background: var(--primary); color: white; width: 80%; margin-top: 20px; font-size: 1.1rem; }

        .progress { font-size: 14px; font-weight: 600; color: var(--text-sub); margin-bottom: 15px; }
        .question { font-size: 1.3rem; font-weight: 700; margin-bottom: 25px; line-height: 1.5; color: var(--text-main); }
        .options { display: grid; gap: 12px; }
        button.option { padding: 15px; border: 2px solid #f0f0f0; border-radius: 12px; background: white; text-align: left; color: #444; }
        button.option:hover { border-color: var(--primary); background: #f0f7ff; }

        .feedback { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; }
        .correct { background: #e6fffa; color: #234e52; border: 1px solid #38b2ac; }
        .wrong { background: #fff5f5; color: #742a2a; border: 1px solid #feb2b2; }

        #next-btn { margin-top: 20px; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="step-name" class="overlay">
        <h2>소프트웨어공학 퀴즈</h2>
        <p>닉네임을 입력해주세요</p>
        <input type="text" id="user-name-input" placeholder="이름 입력">
        <button class="start-btn" onclick="goToSetup()">다음</button>
    </div>

    <div id="step-setup" class="overlay" style="display: none;">
        <h2>퀴즈 설정</h2>
        <div class="setup-group">
            <p>문제 유형</p>
            <div class="btn-group">
                <button id="type-choice" class="selected" onclick="setType('choice')">객관식</button>
                <button id="type-short" onclick="setType('short')">단답형</button>
            </div>
        </div>
        <div class="setup-group">
            <p>문제 수</p>
            <div class="btn-group">
                <button id="count-20" class="selected" onclick="setCount(20)">20문제</button>
                <button id="count-30" onclick="setCount(30)">30문제</button>
                <button id="count-50" onclick="setCount(50)">50문제</button>
            </div>
        </div>
        <button class="start-btn" onclick="startQuiz()">퀴즈 시작하기</button>
    </div>

    <div id="quiz-content" style="display: none;">
        <div class="progress" id="progress"></div>
        <div class="question" id="question"></div>
        <div class="options" id="options"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()">다음 문제</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소프트웨어공학 퀴즈 마스터</title>
    <style>
        :root { 
            --primary: #4a90e2; 
            --primary-hover: #357abd;
            --bg: #f5f7fa; 
            --text-main: #333;
            --text-sub: #888;
            --white: #ffffff;
        }

        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; 
        }

        #quiz-container { 
            background: var(--white); 
            width: 100%; 
            max-width: 550px; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            position: relative;
            overflow: hidden;
        }

        /* 공통 오버레이 레이아웃 */
        .view-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { color: var(--text-main); margin-bottom: 8px; font-size: 1.6rem; }
        p { color: var(--text-sub); margin-bottom: 24px; }

        /* 입력창 및 버튼 스타일 */
        input[type="text"] { 
            padding: 14px 20px; 
            width: 100%; 
            max-width: 300px;
            margin-bottom: 20px; 
            border: 2px solid #edf2f7; 
            border-radius: 12px; 
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .main-btn { 
            padding: 16px 40px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-weight: 700;
            width: 100%;
            max-width: 300px;
            transition: background 0.2s, transform 0.1s;
        }
        .main-btn:hover { background: var(--primary-hover); }
        .main-btn:active { transform: scale(0.98); }

        /* 설정 그룹 스타일 */
        .setup-card {
            background: #fcfdfe;
            border: 1px solid #f0f4f8;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            margin-bottom: 24px;
            box-sizing: border-box;
        }

        .setup-label { font-weight: 600; color: var(--text-main); margin-bottom: 16px; display: block; }

        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        
        .toggle-btn { 
            padding: 10px 20px; 
            border: 2px solid #e2e8f0; 
            background: white; 
            color: #718096; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600;
            transition: all 0.2s;
        }
        .toggle-btn.active { 
            border-color: var(--primary); 
            background: #ebf4ff; 
            color: var(--primary); 
        }

        /* 퀴즈 진행 스타일 */
        #quiz-content { display: none; }
        .progress { color: var(--text-sub); font-size: 0.9rem; font-weight: 600; margin-bottom: 12px; }
        .question { font-size: 1.3rem; font-weight: 700; margin-bottom: 28px; line-height: 1.5; color: var(--text-main); text-align: left; }
        .options { display: grid; gap: 12px; }
        .option { 
            padding: 16px 20px; border: 2px solid #f0f4f8; border-radius: 14px; 
            background: white; cursor: pointer; text-align: left; font-size: 1rem;
            transition: all 0.2s;
        }
        .option:hover { border-color: var(--primary); background: #f8fbff; }

        .feedback { margin-top: 24px; padding: 20px; border-radius: 14px; display: none; font-size: 0.95rem; line-height: 1.6; }
        .correct { background: #f0fff4; border: 1px solid #c6f6d5; color: #276749; }
        .wrong { background: #fff5f5; border: 1px solid #fed7d7; color: #9b2c2c; }

        #next-btn { margin-top: 24px; width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; display: none; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="step-name" class="view-step">
        <h2>소프트웨어공학 퀴즈</h2>
        <p>닉네임을 입력해주세요</p>
        <input type="text" id="user-name-input" placeholder="이름 입력" onkeypress="if(event.keyCode==13) goToSetup()">
        <button class="main-btn" onclick="goToSetup()">다음</button>
    </div>

    <div id="step-setup" class="view-step" style="display: none;">
        <h2>퀴즈 설정</h2>
        <p>학습 방식을 선택하세요</p>
        
        <div class="setup-card">
            <span class="setup-label">문제 유형</span>
            <div class="btn-group">
                <button id="type-choice" class="toggle-btn active" onclick="setType('choice')">객관식</button>
                <button id="type-short" class="toggle-btn" onclick="setType('short')">단답형</button>
            </div>
        </div>

        <div class="setup-card">
            <span class="setup-label">문제 수</span>
            <div class="btn-group">
                <button id="count-20" class="toggle-btn active" onclick="setCount(20)">20개</button>
                <button id="count-30" class="toggle-btn" onclick="setCount(30)">30개</button>
                <button id="count-50" class="toggle-btn" onclick="setCount(50)">50개</button>
            </div>
        </div>

        <button class="main-btn" onclick="startQuiz()">퀴즈 시작하기</button>
    </div>

    <div id="quiz-content">
        <div class="progress" id="progress"></div>
        <div class="question" id="question"></div>
        <div class="options" id="options"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()">다음 문제</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소프트웨어공학 퀴즈</title>
    <style>
        :root { 
            --primary: #4a90e2; 
            --bg: #f5f7fa; 
            --text-main: #333;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #quiz-container { 
            background: white; 
            width: 100%; 
            max-width: 450px; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            position: relative;
        }

        /* 화면 전환용 */
        .step-view { display: none; flex-direction: column; align-items: center; text-align: center; }
        .step-view.active { display: flex; }

        h2 { margin-bottom: 20px; color: var(--text-main); }
        p { margin: 10px 0; font-weight: bold; color: #555; }

        input[type="text"] { 
            padding: 14px; width: 80%; margin-bottom: 20px; 
            border: 2px solid #eee; border-radius: 12px; outline: none;
        }

        .btn-group { display: flex; gap: 8px; margin-bottom: 25px; justify-content: center; }
        
        .toggle-btn { 
            padding: 10px 18px; border: 2px solid #eee; background: white; 
            border-radius: 10px; cursor: pointer; font-weight: bold; color: #888;
            transition: all 0.2s;
        }
        /* 버튼 선택되었을 때 스타일 */
        .toggle-btn.selected { border-color: var(--primary); color: var(--primary); background: #f0f7ff; }

        .action-btn { 
            background: var(--primary); color: white; border: none; 
            padding: 15px; width: 100%; border-radius: 12px; 
            font-size: 1rem; font-weight: bold; cursor: pointer;
        }

        /* 퀴즈 진행 스타일 */
        .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; text-align: left; width: 100%; }
        .option { 
            width: 100%; text-align: left; padding: 15px; margin-bottom: 10px; 
            border: 1px solid #eee; background: #fff; cursor: pointer; border-radius: 10px;
        }
        .feedback { margin-top: 15px; padding: 15px; border-radius: 10px; display: none; text-align: left; font-size: 0.9rem; }
        .correct { background: #e6fffa; color: #234e52; }
        .wrong { background: #fff5f5; color: #742a2a; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="step-name" class="step-view active">
        <h2>반갑습니다!</h2>
        <p>닉네임을 입력해주세요</p>
        <input type="text" id="user-name-input" placeholder="이름 입력">
        <button class="action-btn" onclick="nextToSetup()">다음 단계</button>
    </div>

    <div id="step-setup" class="step-view">
        <h2>퀴즈 설정</h2>
        
        <p>문제 유형</p>
        <div class="btn-group">
            <button id="type-choice" class="toggle-btn selected" onclick="changeType('choice')">객관식</button>
            <button id="type-short" class="toggle-btn" onclick="changeType('short')">단답형</button>
        </div>

        <p>문제 개수</p>
        <div class="btn-group">
            <button id="cnt-20" class="toggle-btn selected" onclick="changeCount(20)">20문제</button>
            <button id="cnt-30" class="toggle-btn" onclick="changeCount(30)">30문제</button>
            <button id="cnt-50" class="toggle-btn" onclick="changeCount(50)">50문제</button>
        </div>

        <button class="action-btn" onclick="startQuiz()">퀴즈 시작하기</button>
    </div>

    <div id="step-quiz" class="step-view">
        <div id="progress" style="margin-bottom:10px; color:#888; font-size:0.8rem;"></div>
        <div id="question" class="question"></div>
        <div id="options-container" style="width:100%;"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" class="action-btn" onclick="nextQuestion()" style="display:none; margin-top:15px;">다음 문제</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소프트웨어공학 퀴즈</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; --text-main: #333; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #quiz-container { background: white; width: 100%; max-width: 500px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        
        /* 공통 오버레이 스타일 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 20px; box-sizing: border-box; }
        
        input[type="text"] { padding: 12px; width: 80%; margin-bottom: 15px; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; }
        
        .setup-group { margin-bottom: 20px; text-align: center; width: 100%; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        
        button { padding: 10px 15px; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button.selected { background: var(--primary); color: white; }
        
        .start-btn { background: var(--primary); color: white; width: 80%; padding: 15px; border: none; border-radius: 8px; margin-top: 10px; font-size: 1rem; cursor: pointer; }
        
        #quiz-content { display: none; width: 100%; }
        .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; line-height: 1.5; }
        .options { display: grid; gap: 10px; }
        .option { text-align: left; padding: 12px; border: 1px solid #ddd; border-radius: 10px; background: #fff; cursor: pointer; }
        .option:hover { background: #f0f7ff; border-color: var(--primary); }
        
        .feedback { margin-top: 15px; padding: 15px; border-radius: 10px; display: none; font-size: 0.95rem; line-height: 1.4; }
        .correct { background: #e6fffa; color: #234e52; border: 1px solid #38b2ac; }
        .wrong { background: #fff5f5; color: #742a2a; border: 1px solid #feb2b2; }
        
        #short-answer-input { padding: 12px; width: 100%; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="step-name" class="overlay">
        <h2>소프트웨어공학 퀴즈</h2>
        <p>닉네임을 입력해주세요</p>
        <input type="text" id="user-name-input" placeholder="이름 입력">
        <button class="start-btn" onclick="goToSetup()">다음</button>
    </div>

    <div id="step-setup" class="overlay" style="display: none;">
        <h3>퀴즈 설정</h3>
        <div class="setup-group">
            <p>문제 유형</p>
            <div class="btn-group">
                <button id="type-choice" class="selected" onclick="setType('choice')">객관식</button>
                <button id="type-short" onclick="setType('short')">단답형</button>
            </div>
        </div>
        <div class="setup-group">
            <p>문제 수</p>
            <div class="btn-group">
                <button id="count-20" class="selected" onclick="setCount(20)">20개</button>
                <button id="count-30" onclick="setCount(30)">30개</button>
                <button id="count-50" onclick="setCount(50)">50개</button>
            </div>
        </div>
        <button class="start-btn" onclick="startQuiz()">퀴즈 시작하기</button>
    </div>

    <div id="quiz-content">
        <div id="progress" style="color: #888; margin-bottom: 10px; font-weight: bold;"></div>
        <div id="question" class="question"></div>
        <div id="options" class="options"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" class="start-btn" onclick="nextQuestion()" style="display:none; width: 100%;">다음 문제</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
